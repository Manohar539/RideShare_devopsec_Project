{% load static %}
<!DOCTYPE html>
<html> 
<head>
    <meta charset="UTF-8">
    <title>RideShare</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<nav class="navbar">
    <div class="logo">RideShare</div>
    <div class="nav-links">
        <a href="/">Home</a>
        {% if user.is_authenticated %}
            <a href="{% url 'searchride' %}">Find Ride</a>
            <a href="{% url 'createride' %}">Offer Ride</a>
            <a href="{% url 'mybookings' %}">My Bookings</a>
            <a href="{% url 'payment_history' %}">Payments</a>
            <form action="{% url 'logout' %}" method="POST" style="display:inline;">
                {% csrf_token %}
                <button type="submit"
                    style="background:none; border:none; color:white; cursor:pointer; margin-left:15px;">
                    Logout
                </button>
            </form>
        {% else %}
            <a href="/accounts/login/">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </div>
</nav>
{% block content %}
{% endblock %}
<script src="{% static 'js/script.js' %}"></script>
</body>
</html>
