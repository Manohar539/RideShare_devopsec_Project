{% load static %}
<!DOCTYPE html>
<html> 
<head>
    <meta charset="UTF-8">
    <title>RideShare</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar">
    <div class="logo">RideShare</div>
    <div class="nav-links">
        <a href="/">Home</a>

        {% if user.is_authenticated %}
            <a href="{% url 'searchride' %}">Find Ride</a>
            <a href="{% url 'createride' %}">Offer Ride</a>
            <a href="{% url 'mybookings' %}">My Bookings</a>
            <a href="{% url 'payment_history' %}">Payments</a>

            <form action="{% url 'logout' %}" method="POST" style="display:inline;">
                {% csrf_token %}
                <button type="submit"
                    style="background:none; border:none; color:white; cursor:pointer; margin-left:15px;">
                    Logout
                </button>
            </form>

        {% else %}
            <!-- 🔥 CHANGE: Replace link with button -->
            <button onclick="openLogin()" class="login-btn">Login</button>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </div>
</nav>

<!-- 🔥 LOGIN MODAL (ADD THIS BELOW NAVBAR) -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeLogin()">&times;</span>

    <h2>Login</h2>

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>
  </div>
</div>

{% block content %}
{% endblock %}

<script src="{% static 'js/script.js' %}"></script>
</body>
</html>
