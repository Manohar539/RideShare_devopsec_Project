{% extends 'base.html' %}

{% block content %}

<h2 style="text-align:center; margin-top:30px;">Create Ride</h2>

<div style="text-align:center; margin:20px;">

{% if messages %}
    {% for message in messages %}
        <p style="color:green;">{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

{{ form.as_p }}

<button type="submit">Create Ride</button>

</form>

</div>

{% endblock %}
